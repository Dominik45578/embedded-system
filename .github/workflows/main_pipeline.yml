name: Full Stack IoT CI

on:
  pull_request:
    branches: [ main ]

jobs:
  # 1. ENTERPRISE PATH FILTERING (Zamiast ręcznego skryptu Bash)
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      mobile: ${{ steps.filter.outputs.mobile }}
      firmware: ${{ steps.filter.outputs.firmware }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'shared/**'
            frontend:
              - 'frontend/**'
              - 'shared/**'
            mobile:
              - 'mobile/**'
              - 'shared/**'
            firmware:
              - 'firmware/**'
              - 'shared/**'

  # 2. BACKEND (Java + Docker Compose)
  build-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Nadanie uprawnień wykonywania (Chmod)
        run: chmod +x backend/mvnw

      - name: Budowa aplikacji Java (Maven)
        working-directory: backend
        run: ./mvnw -B clean package -DskipTests

      - name: Uruchomienie środowiska Docker Compose
        working-directory: backend
        # Podnosi kontenery (np. bazę i samą aplikację Java) w tle
        run: docker compose up -d --build

      - name: Testy integracyjne na działających kontenerach
        working-directory: backend
        # W tym momencie testy mogą uderzać do podniesionej bazy w Dockerze
        run: ./mvnw -B verify

      - name: Czyszczenie środowiska Docker
        if: always()
        working-directory: backend
        run: docker compose down -v

  # 3. FRONTEND (Web)
  build-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalacja zależności i budowa
        working-directory: frontend
        run: |
          npm ci
          npm run build

  # 4. MOBILE (Flutter)
  build-mobile:
    needs: changes
    if: needs.changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Set up JDK 17 (Wymagane dla Androida)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Nadanie uprawnień dla Gradlew (Chmod)
        # Częsty problem na CI, gdy skrypt z Windowsa ląduje na Linuxie
        run: chmod +x mobile/android/gradlew

      - name: Pobranie paczek i budowa APK
        working-directory: mobile
        run: |
          flutter pub get
          flutter test
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mobile-apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

          
  build-firmware:
    needs: changes
    if: needs.changes.outputs.firmware == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('firmware/platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-

      - name: Instalacja PlatformIO Core
        run: python3 -m pip install --upgrade pip platformio

      - name: Kompilacja Firmware (Auto-env)
        # PlatformIO automatycznie zbuduje środowiska zdefiniowane w platformio.ini
        run: pio run -d firmware

      - name: Upload pliku binarnego (Firmware)
        uses: actions/upload-artifact@v4
        with:
          name: esp32-firmware
          path: firmware/.pio/build/
          retention-days: 7