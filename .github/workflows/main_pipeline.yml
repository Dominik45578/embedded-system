name: Full Stack IoT CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
jobs:
  # 1. ENTERPRISE PATH FILTERING (Zamiast ręcznego skryptu Bash)
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      mobile: ${{ steps.filter.outputs.mobile }}
      firmware: ${{ steps.filter.outputs.firmware }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'shared/**'
            frontend:
              - 'frontend/**'
              - 'shared/**'
            mobile:
              - 'mobile/**'
              - 'shared/**'
            firmware:
              - 'firmware/**'
              - 'shared/**'

  # 2. BACKEND (Java + Docker Compose)
  build-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Grant execute permission for mvnw
        run: chmod +x backend/mvnw

      - name: Build Java application
        working-directory: backend
        run: ./mvnw -B clean package -DskipTests

      - name: Start Docker Compose environment
        working-directory: backend
        run: docker compose up -d --build

      - name: Run integration tests
        working-directory: backend
        run: ./mvnw -B verify

      - name: Clean up Docker environment
        if: always()
        working-directory: backend
        run: docker compose down -v

  # 3. FRONTEND (Web)
  build-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalacja zależności i budowa
        working-directory: frontend
        run: |
          npm ci
          npm run build

  build-mobile:
    needs: changes
    if: needs.changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Generate Gradle Wrapper
        working-directory: mobile/android
        run: gradle wrapper

      - name: Grant execute permission for gradlew
        run: chmod +x mobile/android/gradlew

      - name: Inject Firebase configuration from Secrets
        working-directory: mobile
        env:
          GOOGLE_SERVICES_BASE64: ${{ secrets.GOOGLE_SERVICES_BASE64 }}
          FIREBASE_OPTIONS_BASE64: ${{ secrets.FIREBASE_OPTIONS_BASE64 }}
        run: |
          echo "$GOOGLE_SERVICES_BASE64" | base64 --decode > android/app/google-services.json
          echo "$FIREBASE_OPTIONS_BASE64" | base64 --decode > lib/firebase_options.dart

      - name: Get packages and build APK
        working-directory: mobile
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mobile-apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
          
  build-firmware:
    needs: changes
    if: needs.changes.outputs.firmware == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('firmware/platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-

      - name: Install PlatformIO Core
        run: python3 -m pip install --upgrade pip platformio

      - name: Compile Firmware
        run: pio run -d firmware

      - name: Upload Firmware binary
        uses: actions/upload-artifact@v4
        with:
          name: esp32-firmware
          path: firmware/.pio/build/
          retention-days: 7